kind = "web"
previewPath = "/"
title = "דרך השמש - הצעות מחיר"
version = "1.0.0"
id = "artifacts/derech-hashemesh"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22763

[services.development]
run = "pnpm --filter @workspace/derech-hashemesh run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/derech-hashemesh", "run", "build" ]
publicDir = "artifacts/derech-hashemesh/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22763"
BASE_PATH = "/"
